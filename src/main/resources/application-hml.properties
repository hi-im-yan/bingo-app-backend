# ── HML profile: H2 database + restricted CORS ──────────────────────────────

# Datasource
spring.datasource.url=jdbc:h2:mem:bingo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# CORS — restrict to explicit origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# QR Code — join URL base
app.join-base-url=${JOIN_BASE_URL:https://yourdomain.com/join}
