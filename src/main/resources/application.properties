# Application
spring.application.name=bingoapp

# Active profile (override with -Dspring.profiles.active=prod)
spring.profiles.active=dev

# JPA / Hibernate (shared)
spring.jpa.hibernate.ddl-auto=update

# Static resources and devtools
spring.web.resources.static-locations=file:src/main/resources/static/
spring.devtools.restart.additional-paths=file:src/main/resources/static/

# SpringDoc / OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# QR Code — join URL base (override per profile if needed)
app.join-base-url=http://localhost:8080/join
