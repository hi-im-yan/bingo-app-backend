# ── Dev profile: PostgreSQL (VPS dev environment) ───────────────────────────

# Datasource
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Console — disabled
spring.h2.console.enabled=false

# CORS — restrict to explicit origins
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# Actuator — expose only health endpoint
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# QR Code — join URL base
app.join-base-url=${JOIN_BASE_URL}

# Discord webhook
app.discord.webhook-url=${DISCORD_WEBHOOK_URL}
